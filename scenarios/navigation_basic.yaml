name: navigation_basic
robot_config:
  type: differential_drive
  max_velocity: 1.0
  max_acceleration: 0.5
environment:
  obstacles:
    - {x: 2.0, y: 2.0, radius: 0.5}
    - {x: 5.0, y: 3.0, radius: 0.3}
  bounds:
    min_x: 0.0
    max_x: 10.0
    min_y: 0.0
    max_y: 10.0
goal:
  type: navigate_to_pose
  pose:
    x: 8.0
    y: 8.0
    theta: 0.0
