repos:
  # Ruff linting and import sorting (replaces flake8 + isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        files: ^(agent_ros_bridge|tests)/.*\.py$
      - id: ruff-format
        args: ['--line-length=100']
        files: ^(agent_ros_bridge|tests)/.*\.py$

  # Code formatting (Black for non-Ruff files)
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100']
        files: ^(agent_ros_bridge|tests)/.*\.py$

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
        args: ['--ignore-missing-imports', '--show-error-codes']
        files: ^agent_ros_bridge/.*\.py$

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-iii', '-ll', '-q']
        files: ^agent_ros_bridge/.*\.py$
        exclude: ^tests/

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # Documentation
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: rst-backticks
      - id: python-check-blanket-noqa
      - id: python-check-mock-methods

  # Commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Local hooks
  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest-quick
        entry: pytest tests/unit -x -q --tb=line
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]

      - id: check-todos
        name: Check for TODO/FIXME
        entry: grep -rn "TODO\|FIXME\|XXX" --include="*.py" agent_ros_bridge/ || true
        language: system
        pass_filenames: false
        always_run: true
