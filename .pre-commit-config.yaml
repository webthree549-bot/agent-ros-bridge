# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3.11

repos:
  # ========================================
  # General
  # ========================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
      # - id: requirements-txt-fixer  # Disabled - we use pyproject.toml as source of truth

  # ========================================
  # Python
  # ========================================
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100']

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '100']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-pyyaml
          - types-requests
        args: ['--ignore-missing-imports']

  # ========================================
  # Security
  # ========================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']

  # pip-audit disabled - requires requirements.txt
  # Consider using: pip-audit --desc on venv after pip install -e "."
  # - repo: https://github.com/trailofbits/pip-audit
  #   rev: v2.6.1
  #   hooks:
  #     - id: pip-audit
  #       args: ['--requirement', 'requirements.txt']

  # ========================================
  # Docker
  # ========================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.1-beta
    hooks:
      - id: hadolint-docker
        args: ['--ignore', 'DL3008', '--ignore', 'DL3013']

  # ========================================
  # TDD Compliance
  # ========================================
  - repo: local
    hooks:
      - id: check-tdd
        name: Check TDD Compliance
        entry: python scripts/check_tdd.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # ========================================
  # Container Security
  # ========================================
  - repo: https://github.com/aquasecurity/trivy
    rev: v0.48.3
    hooks:
      - id: trivy-docker
        name: Trivy Docker Scan
        entry: trivy
        args: ['image', '--severity', 'HIGH,CRITICAL', '--exit-code', '1']
        language: system
        pass_filenames: false
        files: Dockerfile
        stages: [pre-push]

  # ========================================
  # Git
  # ========================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  # ========================================
  # Shell
  # ========================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ['--severity=warning']
