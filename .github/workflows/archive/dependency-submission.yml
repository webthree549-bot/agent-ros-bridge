# Dependency Submission Workflow
# Submits dependency graph to GitHub for security alerts

name: Dependency Submission

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Submit dependency graph
        uses: github/dependency-submission-action@v1
        with:
          continue-on-error: true  # Don't fail CI if this step fails
