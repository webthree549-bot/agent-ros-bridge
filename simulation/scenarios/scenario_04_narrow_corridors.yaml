name: "Narrow Corridors"
description: "Navigate through narrow corridors"
world: "empty_warehouse"
duration: 120

robots:
  - name: "turtlebot_01"
    model: "turtlebot3_waffle"
    pose: {x: -9.0, y: -9.0, z: 0.1, yaw: 0.0}

obstacles:
  # Corridor walls
  - type: "box"
    name: "corridor_wall_1"
    size: {x: 10.0, y: 0.2, z: 1.0}
    pose: {x: 0.0, y: -1.0, z: 0.5}
  - type: "box"
    name: "corridor_wall_2"
    size: {x: 10.0, y: 0.2, z: 1.0}
    pose: {x: 0.0, y: 1.0, z: 0.5}
  # Corridor entrance/exit walls
  - type: "box"
    name: "corridor_wall_3"
    size: {x: 0.2, y: 8.0, z: 1.0}
    pose: {x: -5.0, y: 0.0, z: 0.5}
  - type: "box"
    name: "corridor_wall_4"
    size: {x: 0.2, y: 8.0, z: 1.0}
    pose: {x: 5.0, y: 0.0, z: 0.5}

goal:
  pose: {x: 9.0, y: 9.0, yaw: 0.0}
  tolerance:
    position: 0.3
    orientation: 0.1

success_criteria:
  - "Robot navigates through 2m wide corridor"
  - "No wall collisions"
  - "Reaches goal within 90s"
  - "Maintains centered position in corridor"

metrics:
  - path_length
  - navigation_duration
  - min_obstacle_distance
  - wall_contact_count
  - goal_reached
